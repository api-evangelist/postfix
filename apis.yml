apis:
  - aid: postfix:smtp
    name: Postfix SMTP
    description: >-
      Postfix implements SMTP (RFC 5321) for sending and receiving electronic
      mail, with submission (port 587), SMTPS (port 465), and standard SMTP
      (port 25) endpoints. There is no public HTTP/REST API; integration is
      via SMTP protocol, configuration files, milter (mail filter) hooks, and
      policy daemons.
    humanURL: https://www.postfix.org/documentation.html
    baseURL: smtp://localhost:25
    tags:
      - SMTP
      - Email
      - Mail Server
      - Protocol
    properties:
